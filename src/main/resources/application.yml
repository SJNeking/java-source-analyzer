# ============================================================
# CodeGuardian - Application Configuration
# ============================================================

app:
  name: "CodeGuardian"
  version: "1.0.0"

# ============================================================
# PostgreSQL Database (本地 Docker: redisson_brain_db)
# ============================================================
database:
  url: ${DATABASE_URL:jdbc:postgresql://localhost:15432/postgres}
  username: ${DATABASE_USER:root}
  password: ${DATABASE_PASSWORD:123456}
  max-pool-size: 20
  connection-timeout: 30000

# ============================================================
# Redis Cache
# ============================================================
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:16379}
  password: ${REDIS_PASSWORD:}
  database: 0
  max-total: 50
  max-idle: 10
  min-idle: 5
  timeout-ms: 5000

# ============================================================
# Ollama (本地 LLM)
# ============================================================
ollama:
  endpoint: ${OLLAMA_ENDPOINT:http://localhost:11434}
  chat-model: ${OLLAMA_CHAT_MODEL:qwen2.5-coder:32b}
  embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}

# ============================================================
# OpenAI (备用, 需 API Key)
# ============================================================
openai:
  api-key: ${OPENAI_API_KEY:}
  endpoint: ${OPENAI_ENDPOINT:https://api.openai.com/v1}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4}
  embed-model: ${OPENAI_EMBED_MODEL:text-embedding-3-small}

# ============================================================
# MinIO Object Storage (暂未运行, 需时启动)
# ============================================================
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin_secret}
  bucket: codeguardian
  public-url: ${MINIO_PUBLIC_URL:http://localhost:19000}

# ============================================================
# Analysis Configuration
# ============================================================
analysis:
  source-roots:
    - "src/main/java"
  exclude-patterns:
    - "/test/"
    - "/target/"
    - "/generated/"
  confidence-threshold: 0.5
  fingerprint-ttl-days: 30

# ============================================================
# Logging
# ============================================================
logging:
  level: INFO
  format: TEXT
