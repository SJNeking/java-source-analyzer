# ============================================================
# CodeGuardian v3.5 (Spring Boot Web Edition)
# ============================================================
server:
  port: 8080

spring:
  application:
    name: codeguardian-backend
  
  # 1. PostgreSQL + PGVector (通过 MyBatis 访问)
  datasource:
    url: jdbc:postgresql://localhost:15432/codeguardian
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver

# ============================================================
# MyBatis Configuration
# ============================================================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.dolphinmind.glossary.java.analyze.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境打印 SQL

# ============================================================
# Redisson Configuration (参考 S-PAY-MALL)
# ============================================================
redisson:
  address: redis://localhost:16379
  # password:
  connection-pool-size: 64
  connection-minimum-idle-size: 10

# ============================================================
# MinIO Object Storage
# ============================================================
minio:
  endpoint: http://localhost:19000
  access-key: minioadmin
  secret-key: minioadmin_secret
  bucket: codeguardian-reports

# ============================================================
# Ollama AI Config
# ============================================================
ollama:
  endpoint: http://localhost:11434
  chat-model: qwen2.5-coder:32b
  embed-model: nomic-embed-text

# ============================================================
# Logging
# ============================================================
logging:
  level:
    root: INFO
    cn.dolphinmind: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
