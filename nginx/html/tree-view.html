<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>架构图谱 - 树形继承视图</title>
    <script src="./echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #main { width: 100vw; height: 100vh; }
        .control-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(14, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0aec0; z-index: 100; min-width: 260px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        h3 { margin: 0 0 12px 0; color: #e2e8f0; font-size: 15px; font-weight: 600; }
        label { font-size: 11px; color: #718096; display: block; margin-bottom: 6px; }
        select {
            width: 100%; background: #1a202c; color: #e2e8f0;
            border: 1px solid #2d3748; padding: 8px 10px;
            border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
        }
        select:hover { border-color: #4299e1; }
        .stats { margin-top: 10px; font-size: 10px; color: #718096; display: flex; justify-content: space-between; padding: 6px 8px; background: rgba(26, 32, 44, 0.5); border-radius: 4px; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #4299e1; font-size: 16px; transition: opacity 0.4s;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #1a202c;
            border-top-color: #4299e1; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: #4a5568; font-size: 11px; background: rgba(14, 18, 28, 0.6); padding: 6px 14px; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>🌳 树形继承视图</h3>
        <label>选择项目：</label>
        <select id="projectSelector" onchange="loadProject(this.value)"><option>加载中...</option></select>
        <div class="stats"><span id="statsNodes">节点：-</span><span id="statsLinks">连线：-</span></div>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">正在构建树形结构...</div>
    </div>
    <div class="hint">🖱️ 滚轮缩放 · 点击节点展开/收起子树</div>
    <div id="main"></div>
    <script>
        const chart = echarts.init(document.getElementById('main'), 'dark');
        const COLOR_MAP = {
            'INTERFACE': '#4299e1', 'ABSTRACT_CLASS': '#9f7aea', 'CLASS': '#48bb78',
            'ENUM': '#ed8936', 'UTILITY': '#a0aec0', 'EXTERNAL': '#4a5568'
        };

        function buildTree(nodes, links) {
            const nodeMap = {};
            const childrenMap = {};
            const parentMap = {};
            
            nodes.forEach(n => {
                nodeMap[n.id] = {...n, children: []};
                childrenMap[n.id] = [];
            });
            
            links.forEach(l => {
                if (nodeMap[l.source] && nodeMap[l.target]) {
                    childrenMap[l.target].push(l.source);
                    parentMap[l.source] = l.target;
                }
            });
            
            const roots = nodes.filter(n => !parentMap[n.id] || !nodeMap[parentMap[n.id]]);
            const buildNode = (id, visited = new Set()) => {
                if (visited.has(id)) return null;
                visited.add(id);
                const node = nodeMap[id];
                if (!node) return null;
                return {
                    name: id.split('.').pop(),
                    value: node.value || 10,
                    itemStyle: { color: node.color || COLOR_MAP[node.category] || '#c9d1d9' },
                    desc: node.description || '',
                    children: (childrenMap[id] || []).map(cid => buildNode(cid, new Set(visited))).filter(Boolean)
                };
            };
            
            return {
                name: 'Root',
                children: roots.slice(0, 20).map(r => buildNode(r.id)).filter(Boolean)
            };
        }

        async function init() {
            try {
                const res = await fetch('./data/projects.json?t=' + Date.now());
                const projects = await res.json();
                const sel = document.getElementById('projectSelector');
                sel.innerHTML = '';
                projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.file; opt.textContent = p.name; sel.appendChild(opt);
                });
                if (projects.length) loadProject(projects[0].file);
            } catch (e) { console.error(e); }
        }

        async function loadProject(file) {
            if (!file) return;
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex'; overlay.style.opacity = '1';
            try {
                const res = await fetch(`./data/${file}?t=${Date.now()}`);
                const data = await res.json();
                const treeData = buildTree(data.nodes, data.links);
                
                document.getElementById('statsNodes').textContent = `节点：${data.nodes.length}`;
                document.getElementById('statsLinks').textContent = `连线：${data.links.length}`;
                
                setTimeout(() => {
                    const option = {
                        backgroundColor: 'transparent',
                        tooltip: {
                            trigger: 'item',
                            backgroundColor: 'rgba(26, 32, 44, 0.95)',
                            borderColor: 'rgba(255, 255, 255, 0.15)',
                            formatter: p => `<div style="max-width:200px">
                                <strong style="color:${p.data.itemStyle?.color||'#a0aec0'}">${p.name}</strong>
                                <div style="font-size:11px;color:#a0aec0;margin-top:4px">${p.data.desc || ''}</div>
                            </div>`
                        },
                        series: [{
                            type: 'tree',
                            data: [treeData],
                            top: '5%', left: '10%', bottom: '5%', right: '20%',
                            orient: 'vertical',
                            expandAndCollapse: true,
                            initialTreeDepth: 2,
                            label: {
                                position: 'top',
                                verticalAlign: 'middle',
                                align: 'center',
                                fontSize: 11,
                                color: '#cbd5e0'
                            },
                            leaves: {
                                label: { position: 'bottom', verticalAlign: 'middle', align: 'center' }
                            },
                            emphasis: { focus: 'descendant' },
                            animationDuration: 550,
                            animationDurationUpdate: 750
                        }]
                    };
                    chart.setOption(option, true);
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 300);
                }, 100);
            } catch (e) {
                console.error(e);
                document.getElementById('loadingText').textContent = '错误: ' + e.message;
            }
        }
        init();
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
