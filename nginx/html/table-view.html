<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Java Architecture Table View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        select, input {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            font-size: 13px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        input { width: 280px; }

        .stats-bar {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #161b22;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: #21262d;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #f0f6fc;
            border-bottom: 2px solid #30363d;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            font-size: 12px;
        }

        th:hover { background: #30363d; }

        th .sort-icon {
            margin-left: 4px;
            opacity: 0.5;
        }

        th.sorted .sort-icon { opacity: 1; color: #58a6ff; }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid #21262d;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:hover td { background: #1f242c; }

        /* 列宽定义 */
        .col-name { width: 35%; }
        .col-kind { width: 10%; }
        .col-modifiers { width: 12%; }
        .col-methods { width: 7%; text-align: center; }
        .col-fields { width: 7%; text-align: center; }
        .col-deps { width: 7%; text-align: center; }
        .col-description { width: 22%; }

        .name-cell {
            font-weight: 500;
            color: #f0f6fc;
        }

        .package-cell {
            font-size: 11px;
            color: #8b949e;
            margin-top: 2px;
        }

        .kind-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .CLASS { background: #1f6feb20; color: #58a6ff; border: 1px solid #1f6feb40; }
        .INTERFACE { background: #23863620; color: #3fb950; border: 1px solid #23863640; }
        .ENUM { background: #8957e520; color: #a371f7; border: 1px solid #8957e540; }
        .ABSTRACT { background: #d2992220; color: #e3b341; border: 1px solid #d2992240; }
        .EXTERNAL { background: #484f5820; color: #8b949e; border: 1px solid #484f5840; }

        .modifier {
            display: inline-block;
            padding: 1px 4px;
            margin-right: 4px;
            border-radius: 3px;
            background: #30363d;
            color: #8b949e;
            font-size: 11px;
        }

        .count {
            text-align: center;
            font-weight: 500;
            color: #c9d1d9;
        }

        .description {
            font-size: 12px;
            color: #8b949e;
            max-width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }

        /* 滚动条美化 */
        .table-wrapper::-webkit-scrollbar { width: 10px; height: 10px; }
        .table-wrapper::-webkit-scrollbar-track { background: #161b22; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📊 架构资产清单 (Table View)</h2>
            <div class="controls">
                <select id="projectSelect"></select>
                <input type="text" id="searchInput" placeholder="搜索类名、包路径或注释...">
            </div>
        </div>
        
        <div class="stats-bar" id="statsBar">加载项目数据中...</div>

        <div class="table-wrapper">
            <table id="assetTable">
                <thead>
                    <tr>
                        <th class="col-name" onclick="sortTable(0)">类名 / 包路径 <span class="sort-icon">↕</span></th>
                        <th class="col-kind" onclick="sortTable(1)">类型 <span class="sort-icon">↕</span></th>
                        <th class="col-modifiers" onclick="sortTable(2)">修饰符 <span class="sort-icon">↕</span></th>
                        <th class="col-methods" onclick="sortTable(3)">方法数 <span class="sort-icon">↕</span></th>
                        <th class="col-fields" onclick="sortTable(4)">字段数 <span class="sort-icon">↕</span></th>
                        <th class="col-deps" onclick="sortTable(5)">依赖数 <span class="sort-icon">↕</span></th>
                        <th class="col-description">描述 / 注释</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];
        let currentData = [];
        let currentProject = '';

        // 1. 加载项目列表
        fetch('data/projects.json')
            .then(res => res.json())
            .then(projects => {
                const select = document.getElementById('projectSelect');
                projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.file;
                    opt.textContent = p.name;
                    select.appendChild(opt);
                });
                select.onchange = loadProject;
                if (projects.length > 0) loadProject();
            });

        // 2. 加载项目数据
        function loadProject() {
            const file = document.getElementById('projectSelect').value;
            currentProject = file;
            document.getElementById('statsBar').textContent = '正在加载...';
            
            fetch(`data/${file}`)
                .then(res => res.json())
                .then(data => {
                    allData = (data.nodes || []).map(node => ({
                        ...node,
                        modifiers: node.modifiers || [],
                        depCount: node.depCount || 0
                    }));
                    currentData = [...allData];
                    updateStats();
                    renderTable();
                });
        }

        // 3. 更新统计信息
        function updateStats() {
            const total = allData.length;
            const classes = allData.filter(n => n.category === 'CLASS').length;
            const interfaces = allData.filter(n => n.category === 'INTERFACE').length;
            document.getElementById('statsBar').textContent = 
                `共 ${total.toLocaleString()} 个类 | Class: ${classes} | Interface: ${interfaces} | 已加载: ${currentProject}`;
        }

        // 4. 过滤与渲染（带防抖）
        let searchTimer = null;
        
        function filterAndRender() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // 防抖：300ms 延迟执行
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                if (!keyword) {
                    currentData = [...allData];
                } else {
                    currentData = allData.filter(node => {
                        const searchText = [
                            node.name || '',
                            node.id || '',
                            node.description || '',
                            node.category || ''
                        ].join(' ').toLowerCase();
                        return searchText.includes(keyword);
                    });
                }
                
                console.log(`🔍 搜索: "${keyword}" | 匹配: ${currentData.length}/${allData.length}`);
                updateStats();
                renderTable();
            }, 300);
        }

        function renderTable() {
            const tbody = document.querySelector('#assetTable tbody');
            
            if (currentData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">未找到匹配的类</td></tr>';
                return;
            }

            // 分批渲染优化性能
            const fragment = document.createDocumentFragment();
            const displayData = currentData.slice(0, 1000); // 最多显示 1000 条
            
            displayData.forEach(node => {
                const tr = document.createElement('tr');
                
                // 类名
                const tdName = document.createElement('td');
                tdName.className = 'col-name';
                tdName.innerHTML = `
                    <div class="name-cell">${escapeHtml(node.name || '-')}</div>
                    <div class="package-cell">${escapeHtml(node.id || '')}</div>
                `;
                tr.appendChild(tdName);
                
                // 类型
                const tdKind = document.createElement('td');
                tdKind.className = 'col-kind';
                const category = node.category || 'CLASS';
                tdKind.innerHTML = `<span class="kind-badge ${category}">${category}</span>`;
                tr.appendChild(tdKind);
                
                // 修饰符
                const tdMod = document.createElement('td');
                tdMod.className = 'col-modifiers';
                const mods = node.modifiers || [];
                if (mods.length === 0) {
                    tdMod.innerHTML = '<span style="color:#484f58">-</span>';
                } else {
                    tdMod.innerHTML = mods
                        .filter(m => m && m.trim())
                        .slice(0, 3)
                        .map(m => `<span class="modifier">${escapeHtml(m)}</span>`)
                        .join('');
                    if (mods.length > 3) {
                        tdMod.innerHTML += `<span style="color:#484f58;font-size:11px"> +${mods.length - 3}</span>`;
                    }
                }
                tr.appendChild(tdMod);
                
                // 方法数
                const tdMethods = document.createElement('td');
                tdMethods.className = 'col-methods count';
                tdMethods.textContent = node.methodCount || 0;
                tr.appendChild(tdMethods);
                
                // 字段数
                const tdFields = document.createElement('td');
                tdFields.className = 'col-fields count';
                tdFields.textContent = node.fieldCount || 0;
                tr.appendChild(tdFields);
                
                // 依赖数（如果有的话）
                const tdDeps = document.createElement('td');
                tdDeps.className = 'col-deps count';
                tdDeps.textContent = node.depCount || 0;
                tr.appendChild(tdDeps);
                
                // 描述
                const tdDesc = document.createElement('td');
                tdDesc.className = 'col-description description';
                tdDesc.title = node.description || '';
                tdDesc.textContent = node.description || '-';
                tr.appendChild(tdDesc);
                
                fragment.appendChild(tr);
            });
            
            tbody.innerHTML = '';
            tbody.appendChild(fragment);
        }

        // 5. 排序逻辑
        let sortCol = 0;
        let sortDir = 1;

        function sortTable(colIndex) {
            if (sortCol === colIndex) {
                sortDir *= -1;
            } else {
                sortCol = colIndex;
                sortDir = 1;
            }

            // 更新表头样式
            document.querySelectorAll('th').forEach((th, i) => {
                th.classList.toggle('sorted', i === colIndex);
                const icon = th.querySelector('.sort-icon');
                if (icon) icon.textContent = i === colIndex ? (sortDir === 1 ? '↑' : '↓') : '↕';
            });

            const keys = ['id', 'category', 'modifiers', 'methodCount', 'fieldCount', 'depCount'];
            currentData.sort((a, b) => {
                let valA = a[keys[colIndex]];
                let valB = b[keys[colIndex]];
                
                if (valA === undefined || valA === null) valA = '';
                if (valB === undefined || valB === null) valB = '';
                
                if (typeof valA === 'string') {
                    return valA.localeCompare(valB) * sortDir;
                }
                if (typeof valA === 'number' && typeof valB === 'number') {
                    return (valA - valB) * sortDir;
                }
                // 处理数组（修饰符）
                if (Array.isArray(valA) && Array.isArray(valB)) {
                    return (valA.length - valB.length) * sortDir;
                }
                return (String(valA).localeCompare(String(valB))) * sortDir;
            });
            
            renderTable();
        }

        // 6. 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听
        document.getElementById('searchInput').addEventListener('input', filterAndRender);
    </script>
</body>
</html>
