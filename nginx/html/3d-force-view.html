<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>架构图谱 - 3D 立体视图</title>
    <script src="./echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #main { width: 100vw; height: 100vh; }
        .control-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(14, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0aec0; z-index: 100; min-width: 260px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        h3 { margin: 0 0 12px 0; color: #e2e8f0; font-size: 15px; font-weight: 600; }
        label { font-size: 11px; color: #718096; display: block; margin-bottom: 6px; }
        select {
            width: 100%; background: #1a202c; color: #e2e8f0;
            border: 1px solid #2d3748; padding: 8px 10px;
            border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
        }
        select:hover { border-color: #4299e1; }
        .stats { margin-top: 10px; font-size: 10px; color: #718096; display: flex; justify-content: space-between; padding: 6px 8px; background: rgba(26, 32, 44, 0.5); border-radius: 4px; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #4299e1; font-size: 16px; transition: opacity 0.4s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #1a202c; border-top-color: #4299e1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: #4a5568; font-size: 11px; background: rgba(14, 18, 28, 0.6); padding: 6px 14px; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>🧊 3D 立体视图</h3>
        <label>选择项目：</label>
        <select id="projectSelector" onchange="loadProject(this.value)"><option>加载中...</option></select>
        <div class="stats"><span id="statsNodes">节点：-</span><span id="statsLinks">连线：-</span></div>
    </div>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div id="loadingText">正在初始化 3D 引擎...</div></div>
    <div class="hint">🖱️ 拖拽旋转 · 滚轮缩放 · 右键平移</div>
    <div id="main"></div>
    <script>
        const chart = echarts.init(document.getElementById('main'));
        const COLOR_MAP = {
            'INTERFACE': '#4299e1', 'ABSTRACT_CLASS': '#9f7aea', 'CLASS': '#48bb78',
            'ENUM': '#ed8936', 'UTILITY': '#a0aec0', 'EXTERNAL': '#4a5568'
        };

        async function init() {
            try {
                const res = await fetch('./data/projects.json?t=' + Date.now());
                const projects = await res.json();
                const sel = document.getElementById('projectSelector');
                sel.innerHTML = '';
                projects.forEach(p => { const o = document.createElement('option'); o.value = p.file; o.textContent = p.name; sel.appendChild(o); });
                if (projects.length) loadProject(projects[0].file);
            } catch (e) { console.error(e); }
        }

        async function loadProject(file) {
            if (!file) return;
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex'; overlay.style.opacity = '1';
            try {
                const res = await fetch(`./data/${file}?t=${Date.now()}`);
                const data = await res.json();
                
                // 3D 视图建议限制节点数以保证性能
                const isLarge = data.nodes.length > 800;
                const displayData = isLarge ? {
                    nodes: data.nodes.slice(0, 800),
                    links: data.links.filter(l => {
                        const ids = new Set(data.nodes.slice(0, 800).map(n => n.id));
                        return ids.has(l.source) && ids.has(l.target);
                    })
                } : data;

                document.getElementById('statsNodes').textContent = `节点：${displayData.nodes.length}${isLarge ? '(已精简)' : ''}`;
                document.getElementById('statsLinks').textContent = `连线：${displayData.links.length}`;
                
                setTimeout(() => {
                    chart.setOption({
                        backgroundColor: '#0b0f19',
                        tooltip: {
                            formatter: p => {
                                if (p.dataType === 'node') {
                                    const d = p.data;
                                    return `<strong style="color:${d.color}">${d.name}</strong><br/>
                                            <span style="font-size:11px;color:#cbd5e0">${(d.description||'').substring(0,30)}...</span>`;
                                }
                                return p.name;
                            }
                        },
                        xAxis3D: { min: -1, max: 1 },
                        yAxis3D: { min: -1, max: 1 },
                        zAxis3D: { min: -1, max: 1 },
                        grid3D: {
                            viewControl: { projection: 'perspective', autoRotate: true, autoRotateAfterStill: 3 },
                            light: { main: { intensity: 1.2, shadow: true }, ambient: { intensity: 0.3 } }
                        },
                        series: [{
                            type: 'graph3D',
                            layout: 'force3D',
                            forceAtlas2: { steps: 50, edgeWeightInfluence: 0 },
                            data: displayData.nodes.map(n => ({
                                name: n.id.split('.').pop(),
                                value: [Math.random()*2-1, Math.random()*2-1, Math.random()*2-1],
                                itemStyle: { color: n.color || COLOR_MAP[n.category] || '#c9d1d9' }
                            })),
                            links: displayData.links.map(l => ({ source: l.source, target: l.target })),
                            lineStyle: { width: 1, opacity: 0.1, color: '#4a5568' },
                            symbolSize: 8,
                            emphasis: { label: { show: true } }
                        }]
                    }, true);
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 300);
                }, 100);
            } catch (e) {
                console.error(e);
                document.getElementById('loadingText').textContent = '错误: ' + e.message;
            }
        }
        init();
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
