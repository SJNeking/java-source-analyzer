<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>架构图谱 - 和弦依赖视图</title>
    <script src="./echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #main { width: 100vw; height: 100vh; }
        .control-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(14, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0aec0; z-index: 100; min-width: 260px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        h3 { margin: 0 0 12px 0; color: #e2e8f0; font-size: 15px; font-weight: 600; }
        label { font-size: 11px; color: #718096; display: block; margin-bottom: 6px; }
        select {
            width: 100%; background: #1a202c; color: #e2e8f0;
            border: 1px solid #2d3748; padding: 8px 10px;
            border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
        }
        select:hover { border-color: #4299e1; }
        .stats { margin-top: 10px; font-size: 10px; color: #718096; display: flex; justify-content: space-between; padding: 6px 8px; background: rgba(26, 32, 44, 0.5); border-radius: 4px; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #4299e1; font-size: 16px; transition: opacity 0.4s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #1a202c; border-top-color: #4299e1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: #4a5568; font-size: 11px; background: rgba(14, 18, 28, 0.6); padding: 6px 14px; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>🎸 和弦依赖视图</h3>
        <label>选择项目：</label>
        <select id="projectSelector" onchange="loadProject(this.value)"><option>加载中...</option></select>
        <div class="stats"><span id="statsNodes">包：-</span><span id="statsLinks">依赖：-</span></div>
    </div>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div id="loadingText">正在计算依赖关系...</div></div>
    <div class="hint">🖱️ 悬停查看包间依赖流向</div>
    <div id="main"></div>
    <script>
        const chart = echarts.init(document.getElementById('main'), 'dark');
        const COLORS = ['#4299e1','#9f7aea','#48bb78','#ed8936','#f56565','#4fd1c5','#ecc94b','#a0aec0'];
        
        function buildChordData(nodes, links) {
            const pkgMap = {};
            nodes.forEach(n => {
                const pkg = n.id.split('.').slice(0, Math.min(3, n.id.split('.').length)).join('.');
                pkgMap[pkg] = (pkgMap[pkg] || 0) + 1;
            });
            
            const pkgNames = Object.keys(pkgMap).slice(0, 15);
            const idxMap = {};
            pkgNames.forEach((p, i) => idxMap[p] = i);
            
            const matrix = Array(pkgNames.length).fill(null).map(() => Array(pkgNames.length).fill(0));
            
            links.forEach(l => {
                const srcPkg = l.source.split('.').slice(0, Math.min(3, l.source.split('.').length)).join('.');
                const tgtPkg = l.target.split('.').slice(0, Math.min(3, l.target.split('.').length)).join('.');
                if (idxMap[srcPkg] !== undefined && idxMap[tgtPkg] !== undefined && idxMap[srcPkg] !== idxMap[tgtPkg]) {
                    matrix[idxMap[srcPkg]][idxMap[tgtPkg]]++;
                }
            });
            
            return {
                data: pkgNames.map((name, i) => ({ name, itemStyle: { color: COLORS[i % COLORS.length] } })),
                matrix
            };
        }

        async function init() {
            try {
                const res = await fetch('./data/projects.json?t=' + Date.now());
                const projects = await res.json();
                const sel = document.getElementById('projectSelector');
                sel.innerHTML = '';
                projects.forEach(p => { const o = document.createElement('option'); o.value = p.file; o.textContent = p.name; sel.appendChild(o); });
                if (projects.length) loadProject(projects[0].file);
            } catch (e) { console.error(e); }
        }

        async function loadProject(file) {
            if (!file) return;
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex'; overlay.style.opacity = '1';
            try {
                const res = await fetch(`./data/${file}?t=${Date.now()}`);
                const data = await res.json();
                const chord = buildChordData(data.nodes, data.links);
                document.getElementById('statsNodes').textContent = `包：${chord.data.length}`;
                document.getElementById('statsLinks').textContent = `依赖：${chord.matrix.flat().reduce((a,b)=>a+b,0)}`;
                
                setTimeout(() => {
                    chart.setOption({
                        backgroundColor: 'transparent',
                        tooltip: { trigger: 'item', backgroundColor: 'rgba(26,32,44,0.95)', borderColor: 'rgba(255,255,255,0.15)', textStyle: { color: '#e2e8f0' } },
                        series: {
                            type: 'chord', data: chord.data, matrix: chord.matrix,
                            nodeWidth: 4,
                            label: { color: '#cbd5e0', fontSize: 11 },
                            lineStyle: { color: 'source', opacity: 0.3 },
                            emphasis: { lineStyle: { opacity: 0.8 } }
                        }
                    }, true);
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 300);
                }, 100);
            } catch (e) {
                console.error(e);
                document.getElementById('loadingText').textContent = '错误: ' + e.message;
            }
        }
        init();
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
