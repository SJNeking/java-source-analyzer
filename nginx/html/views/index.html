<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Source Analyzer | Enterprise Workbench</title>
    <!-- ECharts CDN -->
    <script src="../js/lib/echarts.min.js"></script>
    <!-- Global Styles -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- 1. Sidebar (Navigation & Tree) -->
        <nav class="sidebar" aria-label="项目导航">
            <div class="sidebar-header">
                <select id="projectSelector" class="project-select"><option>加载中...</option></select>
            </div>
            <div class="search-box">
                <input type="text" id="treeSearch" class="search-input" placeholder="🔍 搜索类或方法...">
            </div>
            <div id="tree-container" class="tree-container" role="tree">
                <!-- Tree Content Injected Here -->
            </div>
        </nav>

        <!-- 2. Main Area -->
        <main class="main-area" role="main">
            <div class="top-bar">
                <div class="top-bar-title">
                    <span id="view-icon">🔭</span>
                    <span id="view-title">架构依赖图</span>
                </div>
                <div class="nav-tabs" id="nav-tabs">
                    <!-- Tabs Injected via JS or static? Let's do static for SEO/A11y but logic handled by App -->
                    <button class="nav-tab active" data-view="graph" onclick="app.switchView('graph')">📊 视图</button>
                    <button class="nav-tab" data-view="quality" onclick="app.switchView('quality')">⚠️ 质量</button>
                    <button class="nav-tab" data-view="metrics" onclick="app.switchView('metrics')">📈 指标</button>
                </div>
            </div>
            
            <div class="content-viewport">
                <!-- View A: Dashboard (Graph + Stats) -->
                <div id="view-graph" class="view-dashboard">
                    <div class="stats-row">
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--accent)" id="stat-assets">-</div>
                            <div class="stat-label">组件总数</div>
                        </div>
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--warning)" id="stat-issues">-</div>
                            <div class="stat-label">质量风险</div>
                        </div>
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--success)" id="stat-loc">-</div>
                            <div class="stat-label">代码行数</div>
                        </div>
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--text-dim)" id="stat-complexity">-</div>
                            <div class="stat-label">平均复杂度</div>
                        </div>
                    </div>
                    <div class="graph-container">
                        <div id="main-graph" role="img" aria-label="依赖关系图谱"></div>
                    </div>
                </div>

                <!-- View B: Detail (Code + Inspector) -->
                <div id="view-detail" class="view-detail hidden">
                    <div class="code-panel">
                        <div class="code-header">
                            <span id="code-fqn">com.example.Class</span>
                            <span>Java</span>
                        </div>
                        <div class="code-body" id="code-body">
                            <!-- Code Lines -->
                        </div>
                    </div>
                    <aside class="inspector-panel" aria-label="审计面板">
                        <div class="insp-tabs">
                            <div class="insp-tab active" role="tab" tabindex="0" onclick="app.switchInspTab('info')">概况</div>
                            <div class="insp-tab" role="tab" tabindex="0" onclick="app.switchInspTab('quality')">质量 (0)</div>
                            <div class="insp-tab" role="tab" tabindex="0" onclick="app.switchInspTab('metrics')">指标</div>
                        </div>
                        <div id="insp-content" class="insp-content">
                            <!-- Dynamic Inspector Content -->
                        </div>
                    </aside>
                </div>
            </div>
        </main>
    </div>

    <!-- Loader -->
    <div class="loading-overlay hidden" id="loading">
        <div class="spinner"></div>
        <div style="margin-top: 16px; font-size: 13px; color: var(--accent);">正在解析项目资产...</div>
    </div>

    <!-- App Entry Point -->
    <script type="module" src="../dist/app.js"></script>
</body>
</html>
