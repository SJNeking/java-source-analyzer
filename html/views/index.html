<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Source Analyzer | Enterprise Workbench</title>
    <!-- Global Styles -->
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
    <!-- Mermaid.js for UML diagrams (CDN URL can be configured in src/config/server-config.ts) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });</script>
</head>
<body>
    <div class="app-layout">
        <!-- 1. Sidebar (Navigation & Tree) -->
        <nav class="sidebar" aria-label="项目导航">
            <div class="sidebar-header">
                <select id="projectSelector" class="project-select"><option>加载中...</option></select>
            </div>
            <div class="search-box">
                <input type="text" id="treeSearch" class="search-input" placeholder="🔍 搜索类或方法...">
            </div>
            <div id="tree-container" class="tree-container" role="tree">
                <!-- Tree Content Injected Here -->
            </div>
        </nav>

        <!-- 2. Main Area -->
        <main class="main-area" role="main">
            <div class="top-bar">
                <div class="top-bar-title">
                    <span id="view-icon">📄</span>
                    <span id="view-title">源码浏览器</span>
                </div>
                <div class="nav-tabs" id="nav-tabs">
                    <button class="nav-tab active" data-view="explorer" onclick="switchView('explorer')">📄 源码浏览器</button>
                    <button class="nav-tab" data-view="graph" onclick="switchView('graph')">🔗 依赖图</button>
                    <button class="nav-tab" data-view="relations" onclick="switchView('relations')">🔀 跨文件关系</button>
                    <button class="nav-tab" data-view="quality" onclick="switchView('quality')">⚠️ 质量分析</button>
                    <button class="nav-tab" data-view="frontend-quality" onclick="switchView('frontend-quality')">🔬 前端质量</button>
                    <button class="nav-tab" data-view="metrics" onclick="switchView('metrics')">📊 代码指标</button>
                    <button class="nav-tab" data-view="assets" onclick="switchView('assets')">📂 项目资产</button>
                    <button class="nav-tab" data-view="ai-review" onclick="switchView('ai-review')">🤖 AI 审查</button>
                </div>
            </div>
            
            <div class="content-viewport">
                <!-- View A: Dashboard (Graph + Stats) -->
                <div id="view-graph" class="view-dashboard">
                    <div class="stats-row">
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--accent)" id="stat-assets">-</div>
                            <div class="stat-label">组件总数</div>
                        </div>
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--warning)" id="stat-issues">-</div>
                            <div class="stat-label">质量风险</div>
                        </div>
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--success)" id="stat-loc">-</div>
                            <div class="stat-label">代码行数</div>
                        </div>
                        <div class="stat-card" role="status">
                            <div class="stat-value" style="color:var(--text-dim)" id="stat-complexity">-</div>
                            <div class="stat-label">平均复杂度</div>
                        </div>
                    </div>
                    <div class="graph-container">
                        <div id="main-graph" role="img" aria-label="依赖关系图谱"></div>
                    </div>
                </div>

                <!-- View B: Detail (Code + Inspector) -->
                <div id="view-detail" class="view-detail hidden" role="region" aria-label="代码详情视图">
                    <div class="code-panel">
                        <div class="code-header">
                            <span id="code-fqn">com.example.Class</span>
                            <span>Java</span>
                        </div>
                        <div class="code-body" id="code-body">
                            <!-- Code Lines -->
                        </div>
                    </div>
                    <aside class="inspector-panel" aria-label="审计面板">
                        <div class="insp-tabs" role="tablist">
                            <div class="insp-tab active" role="tab" tabindex="0" aria-selected="true" onclick="app.switchInspTab('info')">概况</div>
                            <div class="insp-tab" role="tab" tabindex="0" aria-selected="false" onclick="app.switchInspTab('quality')">质量 (0)</div>
                            <div class="insp-tab" role="tab" tabindex="0" aria-selected="false" onclick="app.switchInspTab('metrics')">指标</div>
                        </div>
                        <div id="insp-content" class="insp-content" aria-live="polite">
                            <!-- Dynamic Inspector Content -->
                        </div>
                    </aside>
                </div>

                <!-- Additional View Containers (Quality, Metrics, Explorer, Relations, Assets, Frontend Quality) -->
                <div id="view-quality" class="view-container hidden" role="region" aria-label="质量分析视图">
                    <div id="quality-content" style="padding: 20px; overflow-y: auto; height: 100%;"></div>
                </div>
                <div id="view-frontend-quality" class="view-container hidden" role="region" aria-label="前端质量分析视图">
                    <div id="frontend-quality-content" style="padding: 20px; overflow-y: auto; height: 100%;"></div>
                </div>
                <div id="view-metrics" class="view-container hidden" role="region" aria-label="代码指标视图">
                    <div id="metrics-content" style="padding: 20px; overflow-y: auto; height: 100%;"></div>
                </div>
                <div id="view-explorer" class="view-container active" role="region" aria-label="源码浏览器视图">
                    <div id="code-explorer-content" style="width:100%; height:100%;"></div>
                </div>
                <div id="view-relations" class="view-container hidden" role="region" aria-label="跨文件关系视图">
                    <div id="relations-content" style="padding: 20px; overflow-y: auto; height: 100%;"></div>
                </div>
                <div id="view-assets" class="view-container hidden" role="region" aria-label="项目资产视图">
                    <div id="assets-content" style="padding: 20px; overflow-y: auto; height: 100%;"></div>
                </div>
                <div id="view-ai-review" class="view-container hidden" role="region" aria-label="AI 审查视图">
                    <div id="ai-review-content" style="padding: 20px; overflow-y: auto; height: 100%;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loader -->
    <div class="loading-overlay hidden" id="loading" role="status" aria-live="polite" aria-busy="true">
        <div class="spinner"></div>
        <div style="margin-top: 16px; font-size: 13px; color: var(--accent);">正在解析项目资产...</div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer"></div>

    <!-- App Entry Point -->
    <script type="module" src="/dist/app.js"></script>
</body>
</html>
