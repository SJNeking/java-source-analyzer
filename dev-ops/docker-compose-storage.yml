version: '3.8'

services:
  # PostgreSQL + PGVector (AI 向量检索)
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16  # 国内镜像加速
    container_name: codeguardian_db
    restart: always
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: codeguardian
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data

  # MinIO (对象存储：代码快照、报告)
  minio:
    image: minio/minio:latest
    container_name: codeguardian_minio
    restart: always
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    command: server /data --console-address ":9001"

  # Redis (缓存：指纹跳审)
  redis:
    image: redis:latest  # 使用本地已有镜像
    container_name: codeguardian_redis
    restart: always
    ports:
      - "16379:6379"
