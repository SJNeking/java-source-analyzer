# ============================================================
# CodeGuardian Unified Storage Stack
# PostgreSQL (with PGVector) + Redis + MinIO
# ============================================================

version: '3.8'

services:
  # ==============================
  # PostgreSQL + PGVector
  # ==============================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codeguardian_db
    restart: always
    environment:
      POSTGRES_USER: codeguardian
      POSTGRES_PASSWORD: codeguardian_secret
      POSTGRES_DB: codeguardian
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../src/main/resources/sql/unified-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command:
      - "postgres"
      - "-c" "max_connections=200"
      - "-c" "shared_buffers=256MB"
      - "-c" "timezone=Asia/Shanghai"
      - "-c" "work_mem=16MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeguardian"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Redis (缓存 + 分布式锁)
  # ==============================
  redis:
    image: redis:7-alpine
    container_name: codeguardian_redis
    restart: always
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command:
      - "redis-server"
      - "--appendonly" "yes"
      - "--maxmemory" "256mb"
      - "--maxmemory-policy" "allkeys-lru"
      - "--save" "900" "1"
      - "--save" "300" "10"
      - "--save" "60" "10000"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # MinIO (对象存储)
  # ==============================
  minio:
    image: minio/minio:latest
    container_name: codeguardian_minio
    restart: always
    ports:
      - "19000:9000"       # API
      - "19001:9001"       # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    volumes:
      - minio_data:/data
    command:
      - "server" "/data"
      - "--console-address" ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==============================
  # MinIO 初始化 (创建 bucket)
  # ==============================
  minio-init:
    image: minio/mc:latest
    container_name: codeguardian_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin_secret;
        mc mb local/codeguardian || true;
        mc anonymous set download local/codeguardian;
        echo 'MinIO bucket ready';
      "

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: codeguardian_network
